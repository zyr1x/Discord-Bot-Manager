ticket:

  # ──────────────────────────────────────────────
  # 📋 АНКЕТА — вопросы которые видит пользователь
  # Поддерживается от 1 до 5 вопросов (ограничение Discord Modal).
  # style: SHORT (одна строка) | PARAGRAPH (многострочный)
  # ──────────────────────────────────────────────
  questions:
    - id: "subject"
      label: "📌 Тема обращения"
      placeholder: "Кратко опишите суть вашего вопроса"
      style: SHORT
      required: true
      min-length: 5
      max-length: 100

    - id: "description"
      label: "📝 Подробное описание"
      placeholder: "Опишите проблему как можно подробнее. Что произошло? Когда?"
      style: PARAGRAPH
      required: true
      min-length: 20
      max-length: 1000

    - id: "priority"
      label: "🔥 Приоритет (низкий / средний / высокий)"
      placeholder: "Насколько срочно нужно решить?"
      style: SHORT
      required: false
      min-length: 0
      max-length: 50

    - id: "contact"
      label: "📞 Как с вами связаться?"
      placeholder: "Discord тег, VK, или другой способ связи"
      style: SHORT
      required: false
      min-length: 0
      max-length: 100

  messages:

    # ──────────────────────────────────────────────
    # 🎫 ПАНЕЛЬ СОЗДАНИЯ ТИКЕТА
    # ──────────────────────────────────────────────
    panel-title: "🎫 Служба поддержки"
    panel-description: |
      Если у вас возник вопрос, проблема или предложение — мы готовы помочь!

      **Как это работает:**
      1️⃣ Нажмите кнопку ниже
      2️⃣ Заполните короткую анкету
      3️⃣ Ожидайте ответа в личном канале

      > ⚠️ Не злоупотребляйте тикетами — только по делу!
    panel-footer: "🕐 Среднее время ответа: до 24 часов"
    panel-color: "#5865F2"

    open-button-label: "Создать тикет"
    open-button-emoji: "🎫"

    # ──────────────────────────────────────────────
    # ⚙️ КОМАНДА /ticket
    # ──────────────────────────────────────────────
    command-description: "Отправить панель создания тикетов в текущий канал"
    panel-sent-success: "✅ Панель тикетов успешно отправлена в этот канал!"

    # ──────────────────────────────────────────────
    # 📬 МОДАЛЬНОЕ ОКНО
    # ──────────────────────────────────────────────
    modal-title: "Новый тикет"

    # ──────────────────────────────────────────────
    # 📁 КАНАЛ ТИКЕТА
    # ──────────────────────────────────────────────
    ticket-channel-prefix: "🎫│"
    ticket-embed-title: "📬 Новый тикет"
    ticket-embed-description: "Ваш тикет принят! Сотрудники скоро ответят.\nПожалуйста, ожидайте и не создавайте дубликаты."
    ticket-embed-color: "#57F287"
    ticket-embed-footer: "BotManager • Система тикетов"
    ticket-user-field: "👤 Автор"
    ticket-created-at-field: "🕐 Создан"

    # ──────────────────────────────────────────────
    # 🔘 КНОПКИ В КАНАЛЕ ТИКЕТА
    # ──────────────────────────────────────────────
    take-button-label: "Взять в работу"
    take-button-emoji: "🔍"
    close-button-label: "Закрыть"
    close-button-emoji: "🔒"
    delete-button-label: "Удалить"
    delete-button-emoji: "🗑️"

    # ──────────────────────────────────────────────
    # 📢 СООБЩЕНИЯ О СМЕНЕ СТАТУСА
    # Доступны плейсхолдеры: {user}
    # ──────────────────────────────────────────────
    taken-message: "🔍 Тикет взят в работу сотрудником {user}. Ожидайте ответа!"
    closed-message: "🔒 Тикет закрыт сотрудником {user}. Написать уже нельзя."
    deleting-message: "🗑️ Канал будет удалён через **5 секунд**..."

    # ──────────────────────────────────────────────
    # ❌ ОШИБКИ
    # ──────────────────────────────────────────────
    error-already-open: "❌ У вас уже есть открытый тикет! Дождитесь его закрытия."
    error-no-permission: "❌ Только сотрудники могут выполнять это действие."